name: Build ardftsrc-rs

on:
  push:
    tags:
      - "v[0-9]*"
      - "v.[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binary:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Select SIMD feature for architecture
        id: features
        shell: bash
        run: |
          case "${{ runner.arch }}" in
            X64)
              echo "features=rayon,avx" >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "features=rayon,neon" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported architecture: ${{ runner.arch }}"
              exit 1
              ;;
          esac

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" && "${{ runner.arch }}" == "ARM64" ]]; then
            export RUSTFLAGS="-C target-cpu=apple-m1"
          elif [[ "${{ runner.arch }}" == "X64" ]]; then
            export RUSTFLAGS="-C target-cpu=x86-64-v3"
          fi

          cargo build --release \
            --bin ardftsrc-rs \
            --features "${{ steps.features.outputs.features }}"

      - name: Set artifact metadata
        id: artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "binary_path=target/release/ardftsrc-rs.exe" >> "$GITHUB_OUTPUT"
            echo "artifact_name=ardftsrc-rs-windows" >> "$GITHUB_OUTPUT"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "binary_path=target/release/ardftsrc-rs" >> "$GITHUB_OUTPUT"
            echo "artifact_name=ardftsrc-rs-macos" >> "$GITHUB_OUTPUT"
          else
            echo "binary_path=target/release/ardftsrc-rs" >> "$GITHUB_OUTPUT"
            echo "artifact_name=ardftsrc-rs-linux" >> "$GITHUB_OUTPUT"
          fi

      - name: Create zip package
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $artifactName = "${{ steps.artifact.outputs.artifact_name }}"
          $archiveName = "$artifactName-$tag.zip"
          Compress-Archive -Path "${{ steps.artifact.outputs.binary_path }}" -DestinationPath $archiveName -Force
          "archive_path=$archiveName" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ steps.package.outputs.archive_path }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.archive_path }}
