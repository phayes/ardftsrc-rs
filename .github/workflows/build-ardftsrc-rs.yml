name: Build ardftsrc-rs

on:
  push:
    tags:
      - "v[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binary:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Select SIMD feature for architecture
        id: features
        shell: bash
        run: |
          case "${{ runner.arch }}" in
            X64)
              echo "features=rayon,avx" >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "features=rayon,neon" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported architecture: ${{ runner.arch }}"
              exit 1
              ;;
          esac

      - name: Build release binary
        run: cargo build --release --bin ardftsrc-rs --features "${{ steps.features.outputs.features }}"

      - name: Set artifact metadata
        id: artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "binary_path=target/release/ardftsrc-rs.exe" >> "$GITHUB_OUTPUT"
            echo "artifact_name=ardftsrc-rs-windows" >> "$GITHUB_OUTPUT"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "binary_path=target/release/ardftsrc-rs" >> "$GITHUB_OUTPUT"
            echo "artifact_name=ardftsrc-rs-macos" >> "$GITHUB_OUTPUT"
          else
            echo "binary_path=target/release/ardftsrc-rs" >> "$GITHUB_OUTPUT"
            echo "artifact_name=ardftsrc-rs-linux" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ steps.artifact.outputs.binary_path }}
